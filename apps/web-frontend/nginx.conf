events {
    worker_connections 1024;
}

http {
    server {
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate certs/server.crt;
        ssl_certificate_key certs/server.key;

        # 瓦片与直方图来自 tmpfs，QT 程序写入 /dev/shm/capture-tiles/
        location /img/capture-tiles/ {
            alias /dev/shm/capture-tiles/;
            # 强制禁用缓存：live 会话是覆盖写，同一路径每帧内容都会变
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            etag off;
            if_modified_since off;
        }

        # 直接下载原图（不复制、不软链接）。与 QT ImageSaveBasePath 一致，下含 CaptureImage/ScheduleImage/solveFailedImage
        location /img/direct/ {
            alias /home/quarcs/images/;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        location / {
            proxy_pass http://localhost:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }

    server {
        listen 8600 ssl;
        server_name localhost;

        ssl_certificate certs/server.crt;
        ssl_certificate_key certs/server.key;

        # 瓦片与直方图来自 tmpfs
        location /img/capture-tiles/ {
            alias /dev/shm/capture-tiles/;
            # 强制禁用缓存：live 会话是覆盖写，同一路径每帧内容都会变
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            etag off;
            if_modified_since off;
        }

        location /img/direct/ {
            alias /home/quarcs/images/;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        location / {
            proxy_pass http://localhost:8600;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
